<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Weather</title>

  <link rel="stylesheet" href="style.css" />

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
</head>
<body>

<div class="background">
  <div class="sun"></div>
  <div class="cloud cloud1"></div>
  <div class="cloud cloud2"></div>
  <div class="cloud cloud3"></div>
  <div class="particles"></div>

  <div class="rain" style="display:none;"></div>
  <div class="snow" style="display:none;"></div>
  <div class="clouds" style="display:none;"></div>
</div>

<header>
  <div class="logo">
    <i class="fa-solid fa-cloud-sun"></i>
    MyWeather
  </div>

  <nav>
    <a href="#">Today</a>
    <a href="#">Hourly</a>
    <a href="#">Forecast</a>
    <a href="maps.html">Maps</a>
  </nav>
</header>

<main>

  <div class="search-box">
    <input
      type="text"
      class="city"
      placeholder="Search city..."
    />

    <button class="search-btn">
      <i class="fa-solid fa-magnifying-glass"></i>
    </button>
  </div>

  <div class="weather-card">

    <div class="top-section">
      <h1 class="city-name">Kyiv, Ukraine</h1>
      <p id="date"></p>
    </div>

    <div class="weather-main">
      <img
        class="weather-icon"
        src=""
        alt="Weather Icon"
      />

      <h2 class="temp">--°C</h2>
    </div>

    <h3 class="description">Loading...</h3>

    <div class="weather-details">

      <div class="detail">
        <i class="fa-solid fa-temperature-high"></i>
        <span>
          Feels Like:
          <span class="feels-like">--</span>°C
        </span>
      </div>

      <div class="detail">
        <i class="fa-solid fa-wind"></i>
        <span>
          Wind:
          <span class="wind">--</span> km/h
        </span>
      </div>

      <div class="detail">
        <i class="fa-solid fa-droplet"></i>
        <span>
          Humidity:
          <span class="humidity">--</span>%
        </span>
      </div>

    </div>

  </div>

</main>

<script>
const dateElement = document.getElementById("date");

function updateDate() {
  const now = new Date();

  dateElement.textContent =
    now.toLocaleDateString("en-US", {
      weekday: "long",
      day: "numeric",
      month: "long"
    });
}

updateDate();
</script>

<script src="script.js"></script>

</body>
</html>
